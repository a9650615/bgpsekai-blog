# Deploys the static Astro build to Cloudflare Pages.
#
# Triggers:
#   - push to `main`     → production deployment
#   - workflow_dispatch  → manual run from the Actions UI
#
# Pages project name: bgpsekai-blog (change here if the CF Pages project is
# created under a different slug — there is no API call from this workflow
# that creates the project, so the name must already exist on Cloudflare).
#
# Required GitHub Actions secrets:
#   CLOUDFLARE_API_TOKEN          Pages "Edit" scoped token
#   CLOUDFLARE_ACCOUNT_ID         numeric / hex CF account id
#   PUBLIC_GA4_MEASUREMENT_ID     G-XXXXXXXXXX, baked into the build
#
# NOT used by this workflow (Ghost import is a one-shot local task, never CI):
#   GHOST_URL / GHOST_CONTENT_KEY / GHOST_ADMIN_KEY
#
# Phase 2 (uncomment when CF Web Analytics is enabled):
#   PUBLIC_CF_BEACON_TOKEN

name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Cancel in-flight deploys for the same ref so only the latest push wins.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build site and publish to Cloudflare Pages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    env:
      PUBLIC_GA4_MEASUREMENT_ID: ${{ secrets.PUBLIC_GA4_MEASUREMENT_ID }}
      # PUBLIC_CF_BEACON_TOKEN: ${{ secrets.PUBLIC_CF_BEACON_TOKEN }}  # Phase 2
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Astro site
        run: npm run build

      - name: Publish to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: bgpsekai-blog
          directory: dist
          # Production for `main`; every other branch publishes a preview.
          branch: ${{ github.ref_name }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
